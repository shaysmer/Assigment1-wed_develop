<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dog Details</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="dog.css" />
</head>
<body>
<div class="container">
  <header class="page-header">
    <h1 id="page-title">Dog Details</h1>
  </header>

  <main class="dog-details-page">
    <div class="dog-details-card">
      <div class="dog-image-wrapper">
        <img id="dog-image" src="" alt="" />
      </div>

      <div class="dog-info">
        <h2 id="dog-name"></h2>

        <p><strong>Breed:</strong> <span id="dog-breed"></span></p>
        <p><strong>Age:</strong> <span id="dog-age"></span></p>
        <p><strong>Sex:</strong> <span id="dog-sex"></span></p>
        <p><strong>House Trained:</strong> <span id="dog-house-trained"></span></p>
        <p><strong>Vaccinated:</strong> <span id="dog-vaccinated"></span></p>

        <div class="dog-story-section">
          <h3>Story</h3>
          <p id="dog-story"></p>
        </div>

        <div class="dog-actions">
          <a id="adopt-link" href="" class="button-link">Adopt Me!</a>
        </div>
      </div>
    </div>

    <div class="navigation-buttons">
      <a id="prev-btn" href="" class="button-link">Prev</a>
      <a id="next-btn" href="" class="button-link">Next</a>
    </div>

    <div class="back-link-wrapper">
      <a href="index.html">Back to list</a>
    </div>
  </main>
</div>

<script src="script.js"></script>
<script src="dog.js"></script>
</body>
</html>
